# Run `fly launch` once to create the app and link this file.
# Change primary_region if most users are elsewhere (e.g. "iad" for US East).
app = 'video-calling-app'
primary_region = 'bom'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine running — required for WebSocket / Socket.IO.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
